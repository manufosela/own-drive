# Geniova Drive - nginx reverse proxy
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/
#
# Prerequisites:
#   - DNS A record: drive.geniova.es → 192.168.63.124
#   - SSL cert at /etc/nginx/ssl/drive.geniova.es.crt
#   - SSL key  at /etc/nginx/ssl/drive.geniova.es.key
#   - Docker container running on port 3000

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name drive.geniova.es;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name drive.geniova.es;

    # --- SSL ---
    ssl_certificate     /etc/nginx/ssl/drive.geniova.es.crt;
    ssl_certificate_key /etc/nginx/ssl/drive.geniova.es.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Security headers ---
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- General proxy settings ---
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # --- Upload endpoints: no buffering, no size limit ---
    location /api/files/upload/ {
        client_max_body_size    0;
        proxy_request_buffering off;
        proxy_buffering         off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;

        proxy_pass http://127.0.0.1:3000;
    }

    # --- Download endpoints: buffering enabled for performance ---
    location /api/files/download {
        proxy_buffering    on;
        proxy_read_timeout 300s;

        proxy_pass http://127.0.0.1:3000;
    }

    # --- Default: all other routes ---
    location / {
        client_max_body_size 10m;
        proxy_pass http://127.0.0.1:3000;
    }
}
